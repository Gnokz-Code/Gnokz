<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Liquid Glass | Centered Mobile Hub</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2=family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #050a15;
      --panel-bg: rgba(10, 18, 36, 0.6);
      --border-glow: rgba(168, 85, 247, 0.4);
      --glass-border: rgba(255, 255, 255, 0.12);
      --primary-gradient: linear-gradient(135deg, #6366f1, #a855f7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 50% 50%, #0d1527, var(--bg-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow: hidden;
      position: relative;
    }

    /* Background Orbs focused around center */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.4;
      pointer-events: none;
    }
    .orb-1 {
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.3), transparent 70%);
      top: 20%;
      left: 15%;
    }
    .orb-2 {
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.25), transparent 70%);
      bottom: 20%;
      right: 15%;
    }

    /* Compact Glass Panel Base */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.15);
      border-radius: 1.25rem;
      z-index: 10;
      width: 100%;
    }

    /* LOGIN CARD (Strictly Snug & Centered) */
    .login-card {
      max-width: 350px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
    }

    .login-card h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .sub-message {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
      border-left: 2px solid #a855f7;
      padding-left: 8px;
    }

    .input-group {
      position: relative;
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 0.6rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.25s;
    }

    .input-group:focus-within {
      border-color: #a855f7;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
    }

    .input-group i:first-child {
      padding-left: 1rem;
      color: rgba(255, 255, 255, 0.4);
    }

    .input-group input {
      background: transparent;
      border: none;
      padding: 0.75rem;
      width: 100%;
      font-size: 0.9rem;
      color: #ffffff;
      outline: none;
    }

    .toggle-password {
      position: absolute;
      right: 1rem;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.4);
    }

    .continue-btn {
      width: 100%;
      background: var(--primary-gradient);
      border: none;
      padding: 0.8rem;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 0.6rem;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      margin-top: 0.25rem;
    }

    .error-message {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 0.6rem;
      border-radius: 0.5rem;
      text-align: center;
      color: #fca5a5;
    }

    .demo-hint {
      margin-top: 1.25rem;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.35);
    }

    /* PRIVATE DASHBOARD (Centered App Canvas for Phone/iPad) */
    .private-hub {
      max-width: 420px;
      display: none;
      z-index: 10;
    }

    .glass-navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .logo-gnoks h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #ffffff;
    }

    .user-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .user-name {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.8rem;
    }

    .logout-btn {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.25);
      padding: 0.3rem 0.65rem;
      border-radius: 0.4rem;
      color: #fca5a5;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .gnoks-header {
      padding: 1.25rem 1rem 0.4rem 1rem;
    }

    .gnoks-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #ffffff;
    }

    .details-section {
      padding: 0 1rem 1rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .details-section h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
    }

    .info-description {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.75);
      margin-top: 0.2rem;
    }

    /* Balanced 2-Column Grid with No Empty Gaps */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.65rem;
      padding: 1rem;
    }

    .category-tile {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 0.75rem;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.4rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
    }

    .tile-icon {
      width: 30px;
      height: 30px;
      background: rgba(168, 85, 247, 0.12);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: #c084fc;
    }

    .tile-text {
      font-weight: 600;
      font-size: 0.85rem;
      color: #ffffff;
    }

    .tile-sub {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.35);
    }

    .disabled-tile {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .private-footer {
      padding: 0.85rem;
      background: rgba(0, 0, 0, 0.15);
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.35);
      border-bottom-left-radius: 1.25rem;
      border-bottom-right-radius: 1.25rem;
    }

    /* ALWAYS CENTERED MODAL FOR MOBILE & TABLET */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(3, 7, 18, 0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-container {
      max-width: 380px;
      transform: scale(0.92);
      transition: transform 0.25s ease;
    }

    .modal-overlay.active .modal-container {
      transform: scale(1);
    }

    .modal-header {
      padding: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 1rem;
      color: #ffffff;
    }

    .close-modal {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 1rem;
      cursor: pointer;
    }

    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 1rem;
      max-height: 50vh;
      overflow-y: auto;
    }

    .option-card {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 0.6rem;
      padding: 0.7rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .card-main-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-icon {
      font-size: 0.9rem;
      color: #c084fc;
    }

    .card-title {
      font-weight: 600;
      font-size: 0.8rem;
      color: #ffffff;
    }

    .card-desc {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.4);
    }

    .card-action {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0.3rem 0.6rem;
      border-radius: 0.4rem;
      color: #ffffff;
      font-weight: 500;
      font-size: 0.7rem;
      cursor: pointer;
    }

    /* FLOATING TOAST UPGRADE */
    .toast-alert {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translate(-50%, 10px);
      background: rgba(10, 15, 30, 0.9);
      border: 1px solid var(--border-glow);
      padding: 0.5rem 1.25rem;
      border-radius: 1.5rem;
      color: #ffffff;
      font-size: 0.75rem;
      z-index: 2000;
      opacity: 0;
      transition: all 0.22s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast-alert.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }
  </style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<!-- FORMS CORE PANEL -->
<form id="loginForm" class="glass-panel login-card">
  <h2><i class="fas fa-fingerprint"></i> Liquid Access</h2>
  <div class="sub-message">Fill credentials to unlock private hub</div>
  
  <div class="input-group">
    <i class="fas fa-user-astronaut"></i>
    <input type="text" id="usernameInput" placeholder="Username" required autocomplete="username">
  </div>
  
  <div class="input-group">
    <i class="fas fa-lock"></i>
    <input type="password" id="passwordInput" placeholder="Password" required autocomplete="current-password">
    <i class="fas fa-eye-slash toggle-password" id="togglePassIcon"></i>
  </div>
  
  <button type="submit" class="continue-btn">
    <span>Unlock private web</span> 
    <i class="fas fa-arrow-right-to-bracket"></i>
  </button>
  
  <div id="errorMsg" class="error-message" style="display: none;"></div>
  <div class="demo-hint"><i class="fas fa-shield"></i> Vault Gateway</div>
</form>

<!-- APP HUB CANVAS -->
<div id="mainApp" class="glass-panel private-hub">
  <div class="glass-navbar">
    <div class="logo-gnoks"><h2><i class="fas fa-gem"></i> Gnoks · vault</h2></div>
    <div class="user-area">
      <span class="user-name"><span id="displayUsername">Gnokz</span></span>
      <button type="button" class="logout-btn" id="logoutBtn">Lock</button>
    </div>
  </div>

  <div class="gnoks-header">
    <h1>Gnoks</h1>
  </div>
  
  <div class="details-section">
    <h3>Details</h3>
    <div class="info-description"><i class="fas fa-database"></i> All important info ko ay nandito</div>
  </div>

  <div class="category-grid" id="categoryGrid"></div>
  
  <div class="private-footer">
    <p><i class="fas fa-crown"></i> Private Web - Owner access only</p>
  </div>
</div>

<!-- COMPACT CENTURED MODAL -->
<div id="modalOverlay" class="modal-overlay">
  <div class="glass-panel modal-container">
    <div class="modal-header">
      <h3 id="modalTitle">Category</h3>
      <button type="button" class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
    </div>
    <div id="modalCardsContainer" class="cards-grid"></div>
  </div>
</div>

<div id="toastAlert" class="toast-alert"></div>

<script>
  (function(){
    const loginForm = document.getElementById('loginForm');
    const mainApp = document.getElementById('mainApp');
    const usernameField = document.getElementById('usernameInput');
    const passwordField = document.getElementById('passwordInput');
    const errorMsgDiv = document.getElementById('errorMsg');
    const togglePass = document.getElementById('togglePassIcon');
    const logoutBtn = document.getElementById('logoutBtn');
    const displayUsernameSpan = document.getElementById('displayUsername');

    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalCardsContainer = document.getElementById('modalCardsContainer');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const toastAlert = document.getElementById('toastAlert');

    const categoriesData = {
      presets: {
        name: 'PRESETS', icon: 'fa-sliders',
        cards: [
          { title: 'Shake Effects', desc: 'Dynamic camera shake', actionLabel: 'GET', icon: 'fa-wave-square' },
          { title: 'Glitch Burst', desc: 'Retro transitions', actionLabel: 'GET', icon: 'fa-bolt' },
          { title: 'Neon Pulse', desc: 'Vibrant intensity', actionLabel: 'GET', icon: 'fa-bolt-lightning' },
          { title: 'Cinematic Fade', desc: 'Smooth transitions', actionLabel: 'GET', icon: 'fa-film' },
          { title: 'Glass Morph', desc: 'Liquid motion', actionLabel: 'GET', icon: 'fa-gem' }
        ]
      },
      links: {
        name: 'LINKS', icon: 'fa-link',
        cards: [
          { title: 'Design Lib', desc: 'Curated UI tools', actionLabel: 'Go', icon: 'fa-palette' },
          { title: 'Motion Lab', desc: 'AE templates', actionLabel: 'Go', icon: 'fa-play' },
          { title: 'Code Pack', desc: 'GSAP utils', actionLabel: 'Copy', icon: 'fa-code' },
          { title: 'Fonts', desc: 'Typography', actionLabel: 'View', icon: 'fa-font' },
          { title: '3D Assets', desc: 'Glass 3d kits', actionLabel: 'Get', icon: 'fa-cube' }
        ]
      },
      prompts: {
        name: 'PROMPTS', icon: 'fa-comment-dots',
        cards: [
          { title: 'Storyteller', desc: 'Narrative arcs', actionLabel: 'Use', icon: 'fa-robot' },
          { title: 'Code Genius', desc: 'Clean script', actionLabel: 'Use', icon: 'fa-terminal' },
          { title: 'UI Critic', desc: 'UX review', actionLabel: 'Use', icon: 'fa-pen-ruler' },
          { title: 'Copy Pro', desc: 'Marketing text', actionLabel: 'Use', icon: 'fa-feather' },
          { title: 'Analyst', desc: 'Data extraction', actionLabel: 'Use', icon: 'fa-chart-line' }
        ]
      },
      otherweb: {
        name: 'OTHER WEB', icon: 'fa-globe',
        cards: [
          { title: 'Cloud Vault', desc: 'Secure drive', actionLabel: 'Open', icon: 'fa-cloud' },
          { title: 'Creator Hub', desc: 'Portfolio site', actionLabel: 'Open', icon: 'fa-star' },
          { title: 'UI Kit', desc: 'Glass layout components', actionLabel: 'Get', icon: 'fa-paintbrush' },
          { title: 'Analytics', desc: 'Performance logs', actionLabel: 'View', icon: 'fa-chart-simple' },
          { title: 'Inspiration', desc: 'Daily feeds', actionLabel: 'Open', icon: 'fa-lightbulb' }
        ]
      }
    };

    function showToast(msg) {
      toastAlert.innerText = msg;
      toastAlert.classList.add('show');
      setTimeout(() => toastAlert.classList.remove('show'), 1800);
    }

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const user = usernameField.value.trim();
      const pass = passwordField.value;

      if(user === 'Gnokz' && pass === 'spc8808'){
        errorMsgDiv.style.display = 'none';
        displayUsernameSpan.innerText = user;
        loginForm.style.display = 'none';
        mainApp.style.display = 'block';
        usernameField.value = '';
        passwordField.value = '';
      } else {
        errorMsgDiv.innerHTML = `<i class="fas fa-circle-exclamation"></i> Invalid Owner Credentials`;
        errorMsgDiv.style.display = 'block';
      }
    });

    logoutBtn.addEventListener('click', () => {
      mainApp.style.display = 'none';
      loginForm.style.display = 'flex';
    });

    function buildCategories(){
      const categoriesList = [
        { id: 'presets', label: 'PRESETS', icon: 'fa-sliders', sub: 'motion pack' },
        { id: 'links', label: 'LINKS', icon: 'fa-link', sub: 'resources' },
        { id: 'prompts', label: 'PROMPTS', icon: 'fa-comment-dots', sub: 'AI tools' },
        { id: 'otherweb', label: 'OTHER WEB', icon: 'fa-globe', sub: 'external' },
        { id: 'accounts', label: 'ACCOUNTS', icon: 'fa-id-card', sub: 'soon', disabled: true }
      ];
      
      const grid = document.getElementById('categoryGrid');
      grid.innerHTML = '';
      
      categoriesList.forEach(cat => {
        const tile = document.createElement('div');
        tile.className = `category-tile ${cat.disabled ? 'disabled-tile' : ''}`;
        if(!cat.disabled) {
          tile.addEventListener('click', () => openModal(cat.id));
        }
        tile.innerHTML = `
          <div class="tile-icon"><i class="fas ${cat.icon}"></i></div>
          <div>
            <div class="tile-text">${cat.label}</div>
            <div class="tile-sub">${cat.sub}</div>
          </div>
        `;
        grid.appendChild(tile);
      });
    }

    function openModal(id) {
      const data = categoriesData[id];
      if(!data) return;
      modalTitle.innerHTML = `<i class="fas ${data.icon}"></i> ${data.name}`;
      modalCardsContainer.innerHTML = '';
      
      data.cards.forEach(card => {
        const cardEl = document.createElement('div');
        cardEl.className = 'option-card';
        cardEl.innerHTML = `
          <div class="card-main-info">
            <div class="card-icon"><i class="fas ${card.icon}"></i></div>
            <div>
              <div class="card-title">${card.title}</div>
              <div class="card-desc">${card.desc}</div>
            </div>
          </div>
          <button class="card-action">${card.actionLabel}</button>
        `;
        cardEl.querySelector('.card-action').addEventListener('click', () => {
          showToast(`Triggered: ${card.title}`);
        });
        modalCardsContainer.appendChild(cardEl);
      });
      modalOverlay.classList.add('active');
    }

    closeModalBtn.addEventListener('click', () => modalOverlay.classList.remove('active'));
    modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) modalOverlay.classList.remove('active'); });

    togglePass.addEventListener('click', () => {
      const isPass = passwordField.type === 'password';
      passwordField.type = isPass ? 'text' : 'password';
      togglePass.classList.toggle('fa-eye-slash', !isPass);
      togglePass.classList.toggle('fa-eye', isPass);
    });

    buildCategories();
  })();
</script>
</body>
</html>

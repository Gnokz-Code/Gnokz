<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Liquid Glass | Gnoks Interactive Hub</title>
  <!-- Google Fonts + Font Awesome 6 (no emoji, pure icons) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0b1120, #030617);
      position: relative;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* animated liquid glass background orbs */
    body::before {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(80, 150, 255, 0.3), rgba(0, 255, 255, 0));
      border-radius: 50%;
      top: -150px;
      left: -180px;
      filter: blur(90px);
      animation: liquidDrift 14s infinite alternate ease-in-out;
      z-index: 0;
    }

    body::after {
      content: "";
      position: absolute;
      width: 550px;
      height: 550px;
      background: radial-gradient(circle, rgba(210, 100, 255, 0.3), rgba(255, 80, 180, 0));
      border-radius: 50%;
      bottom: -150px;
      right: -200px;
      filter: blur(100px);
      animation: liquidDrift 18s infinite alternate-reverse;
      z-index: 0;
    }

    @keyframes liquidDrift {
      0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
      100% { transform: translate(50px, 40px) scale(1.25); opacity: 0.8; }
    }

    /* glass core */
    .glass-panel {
      background: rgba(12, 20, 35, 0.45);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4), 0 0 0 0.5px rgba(255, 255, 255, 0.08) inset;
    }

    /* LOGIN CARD */
    .login-card {
      width: 100%;
      max-width: 460px;
      padding: 2.4rem 2rem;
      animation: fadeSlideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-card h2 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(125deg, #FFFFFF, #b7c9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sub-message {
      color: rgba(210, 225, 255, 0.7);
      font-size: 0.85rem;
      margin: 0.5rem 0 1.8rem 0;
      border-left: 3px solid #8f6eff;
      padding-left: 12px;
    }

    .input-group {
      position: relative;
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.2s;
    }

    .input-group:focus-within {
      border-color: #b27eff;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 14px rgba(140, 100, 255, 0.3);
    }

    .input-group i:first-child {
      padding-left: 18px;
      color: #bacdff;
    }

    .input-group input {
      background: transparent;
      border: none;
      padding: 1rem 0.8rem;
      width: 100%;
      font-size: 1rem;
      color: white;
      outline: none;
      font-weight: 500;
    }

    .toggle-password {
      position: absolute;
      right: 18px;
      cursor: pointer;
      color: rgba(220, 230, 255, 0.8);
    }

    .continue-btn {
      width: 100%;
      background: linear-gradient(95deg, #5f4bdb, #a06eff, #5f4bdb);
      background-size: 200% auto;
      border: none;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 3rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      margin-top: 0.5rem;
      box-shadow: 0 8px 18px rgba(90, 60, 210, 0.4);
      transition: 0.25s;
    }

    .continue-btn:hover {
      transform: scale(1.02);
      background-position: right center;
    }

    .error-message {
      margin-top: 1rem;
      font-size: 0.8rem;
      background: rgba(255, 80, 80, 0.15);
      padding: 0.6rem;
      border-radius: 2rem;
      text-align: center;
      color: #ffbcaf;
    }

    .demo-hint {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(200, 215, 255, 0.55);
      background: rgba(0, 0, 0, 0.2);
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 0.3rem 1rem;
      border-radius: 40px;
    }

    /* MAIN HUB */
    .private-hub {
      width: 100%;
      max-width: 1280px;
      margin: 1.5rem;
      display: none;
      z-index: 10;
      position: relative;
      animation: fadeInMain 0.7s ease;
    }

    @keyframes fadeInMain {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    .glass-navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      padding: 0.8rem 1.8rem;
      margin-bottom: 2rem;
      background: rgba(10, 20, 35, 0.5);
      backdrop-filter: blur(18px);
      border-radius: 3rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .logo-gnoks h2 {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(130deg, #F2F6FF, #cbafff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .user-area {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      background: rgba(255,255,255,0.05);
      padding: 0.3rem 1rem 0.3rem 1.5rem;
      border-radius: 3rem;
    }

    .user-name {
      color: white;
      font-weight: 500;
    }

    .logout-btn {
      background: rgba(255, 90, 110, 0.65);
      border: none;
      padding: 0.45rem 1.2rem;
      border-radius: 2rem;
      color: white;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      gap: 8px;
      align-items: center;
      transition: 0.2s;
    }

    .logout-btn:hover {
      background: rgba(255, 60, 85, 0.9);
      transform: scale(0.96);
    }

    /* main info container */
    .info-glass-container {
      background: rgba(15, 25, 45, 0.45);
      backdrop-filter: blur(20px);
      border-radius: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      overflow: hidden;
    }

    .gnoks-header {
      padding: 2rem 2rem 0.5rem 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .gnoks-header h1 {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFFFFF, #d4bcff, #a68eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -1.5px;
    }

    .details-section {
      padding: 1.2rem 2rem 0.5rem 2rem;
    }

    .details-section h3 {
      font-size: 1.7rem;
      font-weight: 600;
      background: linear-gradient(135deg, #e2e9ff, #b294ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .info-description {
      font-size: 1rem;
      color: #cdd9ff;
      margin: 0.5rem 0 1rem 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* category grid (clickable tiles) */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.3rem;
      padding: 1rem 2rem 1.5rem 2rem;
    }

    .category-tile {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      border-radius: 1.8rem;
      padding: 1.2rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
    }

    .category-tile:hover {
      transform: translateY(-4px);
      background: rgba(80, 90, 130, 0.45);
      border-color: rgba(170, 140, 250, 0.7);
      box-shadow: 0 10px 22px -8px rgba(0, 0, 0, 0.3);
    }

    .tile-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(145deg, rgba(110, 80, 210, 0.5), rgba(70, 50, 150, 0.3));
      border-radius: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #cfbefa;
    }

    .tile-text {
      font-weight: 600;
      font-size: 1.2rem;
      color: white;
    }

    .tile-sub {
      font-size: 0.7rem;
      color: #b7c4f0;
      margin-top: 4px;
    }

    .disabled-tile {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .disabled-tile:hover {
      transform: none;
      background: rgba(255, 255, 255, 0.05);
    }

    .private-footer {
      margin: 0.5rem 2rem 2rem 2rem;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      text-align: center;
    }

    .private-footer p {
      color: #ffe6b3;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    /* MODAL (for 5 cards) */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 10, 20, 0.7);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-container {
      background: rgba(20, 30, 55, 0.7);
      backdrop-filter: blur(24px);
      border-radius: 2.5rem;
      width: 90%;
      max-width: 900px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 25px 50px -12px black;
      animation: modalPop 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      overflow: hidden;
    }

    @keyframes modalPop {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 1.8rem;
      font-weight: 700;
      color: white;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .close-modal {
      background: rgba(255,70,70,0.3);
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 40px;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .close-modal:hover {
      background: rgba(255,70,70,0.8);
      transform: rotate(90deg);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.3rem;
      padding: 2rem;
    }

    .option-card {
      background: rgba(10, 20, 35, 0.6);
      backdrop-filter: blur(12px);
      border-radius: 1.6rem;
      padding: 1.2rem;
      border: 1px solid rgba(255,255,255,0.15);
      transition: 0.2s;
      text-align: center;
    }

    .option-card:hover {
      transform: translateY(-5px);
      background: rgba(70, 80, 130, 0.6);
      border-color: #b594ff;
    }

    .card-icon {
      font-size: 2rem;
      color: #cfb5ff;
      margin-bottom: 0.8rem;
    }

    .card-title {
      font-weight: 700;
      font-size: 1.1rem;
      color: white;
      margin-bottom: 0.5rem;
    }

    .card-desc {
      font-size: 0.75rem;
      color: #bcc9f0;
      margin-bottom: 1rem;
    }

    .card-action {
      background: linear-gradient(95deg, #4a3bb5, #8a6eff);
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      color: white;
      font-weight: 500;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .card-action:hover {
      background: #6c51e0;
      transform: scale(0.97);
    }

    @media (max-width: 680px) {
      .private-hub { margin: 0.8rem; }
      .gnoks-header h1 { font-size: 2.6rem; }
      .category-grid { padding: 1rem; gap: 0.9rem; }
      .modal-container { width: 95%; }
      .cards-grid { padding: 1rem; }
    }
  </style>
</head>
<body>

<!-- LOGIN GATEWAY -->
<div id="loginContainer" class="glass-panel login-card">
  <h2><i class="fas fa-fingerprint"></i> Liquid Access</h2>
  <div class="sub-message">Fill credentials to unlock private hub</div>
  <div class="input-group">
    <i class="fas fa-user-astronaut"></i>
    <input type="text" id="usernameInput" placeholder="Username" autocomplete="off">
  </div>
  <div class="input-group">
    <i class="fas fa-lock"></i>
    <input type="password" id="passwordInput" placeholder="Password">
    <i class="fas fa-eye-slash toggle-password" id="togglePassIcon"></i>
  </div>
  <button class="continue-btn" id="continueBtn"><span>Unlock private web</span> <i class="fas fa-arrow-right-to-bracket"></i></button>
  <div id="errorMsg" class="error-message" style="display: none;"></div>
  <div class="demo-hint"><i class="fas fa-shield-haltered"></i> owner only: Gnokz / spc8808</div>
</div>

<!-- MAIN PRIVATE HUB -->
<div id="mainApp" class="private-hub">
  <div class="glass-navbar">
    <div class="logo-gnoks"><h2><i class="fas fa-gem"></i> Gnoks · vault</h2></div>
    <div class="user-area"><span class="user-name"><i class="fas fa-user-check"></i> <span id="displayUsername">Gnokz</span></span>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Lock exit</button></div>
  </div>

  <div class="info-glass-container">
    <div class="gnoks-header"><h1>Gnoks</h1></div>
    <div class="details-section">
      <h3>DETAILS</h3>
      <div class="info-description"><i class="fas fa-database"></i> All important info ko ay nandito</div>
    </div>

    <!-- interactive categories: Presets, Links, Prompts, Other Web, Accounts (disabled) -->
    <div class="category-grid" id="categoryGrid">
      <!-- dynamic from js but static for clarity -->
    </div>
    <div class="private-footer"><p><i class="fas fa-crown"></i> Private Web - Owner access only <i class="fas fa-shield-heart"></i></p></div>
  </div>
</div>

<!-- MODAL STRUCTURE (dynamic) -->
<div id="modalOverlay" class="modal-overlay">
  <div class="modal-container">
    <div class="modal-header">
      <h3 id="modalTitle"><i class="fas fa-layer-group"></i> Category</h3>
      <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
    </div>
    <div id="modalCardsContainer" class="cards-grid">
      <!-- 5 cards injected -->
    </div>
  </div>
</div>

<script>
  (function(){
    // DOM elements login
    const loginContainer = document.getElementById('loginContainer');
    const mainApp = document.getElementById('mainApp');
    const usernameField = document.getElementById('usernameInput');
    const passwordField = document.getElementById('passwordInput');
    const continueBtn = document.getElementById('continueBtn');
    const errorMsgDiv = document.getElementById('errorMsg');
    const togglePass = document.getElementById('togglePassIcon');
    const logoutBtn = document.getElementById('logoutBtn');
    const displayUsernameSpan = document.getElementById('displayUsername');

    // modal elements
    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalCardsContainer = document.getElementById('modalCardsContainer');
    const closeModalBtn = document.getElementById('closeModalBtn');

    // helpers
    function setError(text){
      errorMsgDiv.innerHTML = `<i class="fas fa-circle-exclamation"></i> ${text}`;
      errorMsgDiv.style.display = 'block';
      setTimeout(()=>{ if(errorMsgDiv.style.display === 'block') errorMsgDiv.style.opacity='0.9'; },3000);
    }
    function clearError(){ errorMsgDiv.style.display='none'; errorMsgDiv.innerHTML=''; }

    // credential check
    function attemptLogin(){
      const user = usernameField.value.trim();
      const pass = passwordField.value;
      if(user === 'Gnokz' && pass === 'spc8808'){
        clearError();
        displayUsernameSpan.innerText = user;
        loginContainer.style.display = 'none';
        mainApp.style.display = 'block';
        usernameField.value = '';
        passwordField.value = '';
      } else {
        let err = '';
        if(user === '') err = 'Username required';
        else if(pass === '') err = 'Password required';
        else err = 'Access denied: only Gnokz may enter';
        setError(err);
        loginContainer.style.transform = 'translateX(4px)';
        setTimeout(()=>{ loginContainer.style.transform = ''; },120);
      }
    }

    function logout(){
      mainApp.style.display = 'none';
      loginContainer.style.display = 'flex';
      usernameField.value = '';
      passwordField.value = '';
      clearError();
      loginContainer.style.animation = 'none';
      setTimeout(()=>{ loginContainer.style.animation = 'fadeSlideUp 0.5s ease'; },10);
    }

    // ----- Category Data (5 cards each) -----
    const categoriesData = {
      presets: {
        name: 'PRESETS',
        icon: 'fa-sliders-h',
        cards: [
          { title: 'Shake Effects', desc: 'Dynamic camera shake presets', actionLabel: 'GET PRESET', icon: 'fa-waveform' },
          { title: 'Glitch Burst', desc: 'Retro glitch transitions', actionLabel: 'GET PRESET', icon: 'fa-bolt' },
          { title: 'Neon Pulse', desc: 'Vibrant neon intensity', actionLabel: 'GET PRESET', icon: 'fa-sun' },
          { title: 'Cinematic Fade', desc: 'Smooth fade transitions', actionLabel: 'GET PRESET', icon: 'fa-film' },
          { title: 'Glass Morph', desc: 'Liquid glass motion', actionLabel: 'GET PRESET', icon: 'fa-gem' }
        ]
      },
      links: {
        name: 'LINKS',
        icon: 'fa-link',
        cards: [
          { title: 'Design Library', desc: 'curated UI resources', actionLabel: 'Visit', icon: 'fa-palette' },
          { title: 'Motion Lab', desc: 'After effects templates', actionLabel: 'Visit', icon: 'fa-play' },
          { title: 'Code Snippets', desc: 'React & GSAP utils', actionLabel: 'Copy', icon: 'fa-code' },
          { title: 'Font Archive', desc: 'typography insights', actionLabel: 'Explore', icon: 'fa-font' },
          { title: '3D Assets', desc: 'glassmorphic 3d kits', actionLabel: 'Browse', icon: 'fa-cube' }
        ]
      },
      prompts: {
        name: 'PROMPTS',
        icon: 'fa-comment-dots',
        cards: [
          { title: 'AI Storyteller', desc: 'generate narrative arcs', actionLabel: 'Use prompt', icon: 'fa-robot' },
          { title: 'Code Genius', desc: 'optimized code generation', actionLabel: 'Use prompt', icon: 'fa-terminal' },
          { title: 'Design Critic', desc: 'UI/UX review prompts', actionLabel: 'Use prompt', icon: 'fa-pen-ruler' },
          { title: 'Copywriter Pro', desc: 'marketing copy mastery', actionLabel: 'Use prompt', icon: 'fa-feather' },
          { title: 'Data Analyst', desc: 'insight extraction prompts', actionLabel: 'Use prompt', icon: 'fa-chart-line' }
        ]
      },
      otherweb: {
        name: 'OTHER WEB',
        icon: 'fa-globe',
        cards: [
          { title: 'Vault Resources', desc: 'private cloud storage', actionLabel: 'Access', icon: 'fa-cloud' },
          { title: 'Creator Hub', desc: 'portfolio showcase', actionLabel: 'Visit', icon: 'fa-star' },
          { title: 'Glass UI Kit', desc: 'download components', actionLabel: 'Get Kit', icon: 'fa-paintbrush' },
          { title: 'Analytics Board', desc: 'track performance', actionLabel: 'View', icon: 'fa-chart-simple' },
          { title: 'Inspiration Feed', desc: 'daily design inspo', actionLabel: 'Explore', icon: 'fa-lightbulb' }
        ]
      }
    };

    // Build category tiles in grid
    const categoryGrid = document.getElementById('categoryGrid');
    function buildCategories(){
      const categoriesList = [
        { id: 'presets', label: 'PRESETS', icon: 'fa-sliders-h', sub: 'motion presets' },
        { id: 'links', label: 'LINKS', icon: 'fa-link', sub: 'curated resources' },
        { id: 'prompts', label: 'PROMPTS', icon: 'fa-comment-dots', sub: 'AI workflows' },
        { id: 'otherweb', label: 'OTHER WEB', icon: 'fa-globe', sub: 'external panels' },
        { id: 'accounts', label: 'ACCOUNTS', icon: 'fa-id-card', sub: 'coming soon', disabled: true }
      ];
      categoryGrid.innerHTML = '';
      categoriesList.forEach(cat => {
        const tile = document.createElement('div');
        tile.className = `category-tile ${cat.disabled ? 'disabled-tile' : ''}`;
        if(!cat.disabled){
          tile.addEventListener('click', () => openModal(cat.id));
        }
        tile.innerHTML = `
          <div class="tile-icon"><i class="fas ${cat.icon}"></i></div>
          <div>
            <div class="tile-text">${cat.label}</div>
            <div class="tile-sub"><i class="fas fa-${cat.disabled ? 'ban' : 'hand-pointer'}"></i> ${cat.sub}</div>
          </div>
        `;
        categoryGrid.appendChild(tile);
      });
    }

    // Open modal with 5 cards
    function openModal(categoryId){
      const data = categoriesData[categoryId];
      if(!data) return;
      modalTitle.innerHTML = `<i class="fas ${data.icon}"></i> ${data.name} <span style="font-size:0.8rem;">· 5 options</span>`;
      // generate 5 cards
      modalCardsContainer.innerHTML = '';
      data.cards.forEach(card => {
        const cardEl = document.createElement('div');
        cardEl.className = 'option-card';
        cardEl.innerHTML = `
          <div class="card-icon"><i class="fas ${card.icon}"></i></div>
          <div class="card-title">${card.title}</div>
          <div class="card-desc">${card.desc}</div>
          <button class="card-action" data-action="${card.title}">${card.actionLabel} <i class="fas fa-arrow-right"></i></button>
        `;
        modalCardsContainer.appendChild(cardEl);
      });
      // add listeners to action buttons (simple toast feedback)
      const actionBtns = modalCardsContainer.querySelectorAll('.card-action');
      actionBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const actionName = btn.getAttribute('data-action') || 'item';
          // temporary glass alert
          const toast = document.createElement('div');
          toast.innerText = `Selected: ${actionName}`;
          toast.style.position = 'fixed';
          toast.style.bottom = '20px';
          toast.style.left = '50%';
          toast.style.transform = 'translateX(-50%)';
          toast.style.background = 'rgba(0,0,0,0.7)';
          toast.style.backdropFilter = 'blur(12px)';
          toast.style.padding = '8px 20px';
          toast.style.borderRadius = '40px';
          toast.style.color = 'white';
          toast.style.zIndex = '2000';
          toast.style.fontSize = '0.8rem';
          toast.style.border = '1px solid rgba(255,255,255,0.2)';
          document.body.appendChild(toast);
          setTimeout(()=> toast.remove(), 1500);
        });
      });
      modalOverlay.classList.add('active');
    }

    function closeModal(){
      modalOverlay.classList.remove('active');
    }

    // event binding
    continueBtn.addEventListener('click', (e) => { e.preventDefault(); attemptLogin(); });
    const handleEnter = (e) => { if(e.key === 'Enter') attemptLogin(); };
    usernameField.addEventListener('keypress', handleEnter);
    passwordField.addEventListener('keypress', handleEnter);
    togglePass.addEventListener('click', () => {
      const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordField.setAttribute('type', type);
      togglePass.classList.toggle('fa-eye-slash');
      togglePass.classList.toggle('fa-eye');
    });
    logoutBtn.addEventListener('click', (e) => { e.preventDefault(); logout(); });
    closeModalBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) closeModal(); });
    function clearErrorOnInput(){ if(errorMsgDiv.style.display === 'block') clearError(); }
    usernameField.addEventListener('input', clearErrorOnInput);
    passwordField.addEventListener('input', clearErrorOnInput);

    // init
    loginContainer.style.display = 'flex';
    mainApp.style.display = 'none';
    buildCategories();
    usernameField.focus();
  })();
</script>
</body>
